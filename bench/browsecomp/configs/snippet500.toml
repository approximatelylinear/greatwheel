# Passage+RRF baseline prompt, but context_snippet_chars 300 → 500.
# Hypothesis: longer snippets help extraction on queries where retrieval
# hits but the answer phrase gets truncated at 300 chars.

system_prompt_path = ""

# --- Pre-search ---
n_presearch_queries = 5
presearch_k = 5
prf_top_n = 5
prf_term_count = 5
prf_min_word_len = 4
prf_max_word_len = 20
prf_k = 3
round2_keep_max = 15
round2_new_queries = 3
round2_k = 5
round1_preview_limit = 25
round1_preview_chars = 200
context_snippet_chars = 500

# --- BM25 boost weights ---
bm25_phrase_boost = 4.0
bm25_slop_boost = 2.0
bm25_slop = 2
bm25_and_boost = 1.5
bm25_or_boost = 1.0

# --- rLM loop ---
query_timeout_secs = 180
max_llm_calls = 25
max_search_calls = 20
bridge_timeout_secs = 150

# --- Output truncation ---
repl_output_max_chars = 8000
fallback_history_max_chars = 15000
fallback_msg_max_chars = 2000

# --- Iteration prompts ---
nudge_reminder_start = 3
max_answer_length = 100
