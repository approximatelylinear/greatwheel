er phrase (no extra words or punctuation):\n  FINAL(clean_answer)\n- Never leave without calling FINAL. If you cannot verify by iteration 9, submit the best-supported candidate (highest confidence, strongest anchor overlap, or appearing in 2+ docs).\n\nSEARCH STRATEGY (quick recipe):\n- Start: 2\u20133 tokens from the question (most distinctive nouns/names/numbers).\n- Next: 1\u20132 discovered tokens (surname, org, ISBN prefix, charge phrase) + 1\u20132 question tokens \u2014 materially different from previous searches.\n- Then (verification): candidate phrase + 1\u20132 anchor tokens.\n- Do not run more than 4\u20135 total searches unless strictly needed; prioritize reading and verification.\n\nCOMMON PITFALLS TO AVOID:\n- Selecting a famous or unrelated entity in the doc instead of the asked one.\n- Using generic terms instead of the exact phrasing (e.g., \u201cmanslaughter\u201d vs \u201cdangerous driving occasioning death\u201d).\n- Grabbing the wrong identifier (e.g., wrong ISBN for another edition/book on the same page).\n- Answering from snippets; ALWAYS get_document() first.\n- Hesitating to submit; do not run out of turns. Submit as soon as verified or best-supported.\n\nCODE TEMPLATES (you may adapt; ensure you manage used_searches and submit by \u2264 9):\n\n# Step 1: Explore context quickly and read 2\u20133 docs\nfor i, h in enumerate(context[:12]):\n    print(f\"{i}: {h['docid']} \u2014 {h['snippet'][:200]}\")\npromising_idx = [i for i in range(min(5, len(context)))]\ndocs = {context[i][\"docid\"]: get_document(context[i][\"docid\"]) for i in promising_idx[:3]}\n\n# Step 2: Structured extraction from multiple docs (batch)\nprompts = []\ndocids = list(docs.keys())\nfor did in docids:\n    d = docs[did]\n    prompts.append(\n        \"You are extracting a SINGLE short factual answer from THIS document to answer a question.\\n\"\n        \"Rules:\\n- Copy exact string from the document.\\n- Only return facts explicitly present.\\n\"\n        \"- Tie to the asked entity/event using anchor tokens from the question.\\n\"\n        f\"- The expected answer type is: {answer_type}.\\n\\n\"\n        f\"Question: {question}\\n\\n\"\n        \"Return JSON: {\\\"candidate\\\":\\\"\\\",\\\"evidence_quote\\\":\\\"\\\",\\\"evidence_sentence\\\":\\\"\\\",\\\"anchor_tokens_used\\\":[],\\\"answer_type_check\\\":\\\"\\\",\\\"distractors_considered\\\":[],\\\"why_this_candidate\\\":\\\"\\\",\\\"confidence\\\":\\\"\\\"}\\n\\n\"\n        f\"Document:\\n{d[:8000]}\"\n    )\nresults = batch_llm_query(prompts)\n\n# Step 2b: Aggregate and score candidates\nimport json, re\ndef score_entry(js):\n    try:\n        j = json.loads(js)\n    except:\n        return 0, \"\", {}\n    cand = (j.get(\"candidate\") or \"\").strip()\n    conf = j.get(\"confidence\",\"\").lower()\n    anchors = j.get(\"anchor_tokens_used\") or []\n    atype_ok = 1 if j.get(\"answer_type_check\")==\"yes\" else 0\n    conf_w = {\"high\":3,\"medium\":2,\"low\":1}.get(conf,0)\n    return conf_w + atype_ok + min(len([a for a in anchors if a]),2), cand, j\n\nagg = []\nfor did, res in zip(docids, results):\n    s, cand, j = score_entry(res)\n    if cand:\n        agg.append((s, cand, did, j))\nagg.sort(reverse=True)\nif agg:\n    best_score, best_candidate, best_did, best_json = agg[0]\n    globals()[\"best_candidate\"] = best_candidate\n    print(f\"Leading candidate: {best_candidate}\\nFrom doc: {best_did}\\nDetails: {best_json}\")\n\n# Step 3: Generate DIFFERENT BM25 searches if needed\nused_searches = set(globals().get(\"used_searches\", set()))\ndef try_search(q):\n    if not q or q in used_searches:\n        return []\n    used_searches.add(q)\n    return search(q)\n\nalts = []\nQ = (question or \"\").strip()\n# Build sharp 2\u20135 token alternatives (distinct from each other):\n# 1) Surname/title keyword(s) + event/role token\n# 2) Discovered entity token(s) from docs + question anchor\n# 3) If ISBN/book-related: include 'ISBN' and/or '978'/'979' + title/author token\n# 4) Year/number if present + entity surname/title token\n# Edit these to fit your case before running:\n# alts.append(\"surname exact charge\")\n# alts.append(\"titlekeyword author ISBN 978\")\n# alts.append(\"orgname founder surname\")\n# alts.append(\"entity surname event year\")\nhits2 = []\nfor q in alts:\n    r = try_search(q)\n    if r:\n        hits2.extend(r)\nglobals()[\"used_searches\"] = used_searches\n\n# Read one new promising doc and extract again\nif hits2:\n    newdoc = get_document(hits2[0][\"docid\"])\n    verify_extract = llm_query(\n        \"You are extracting a SINGLE short factual answer from THIS document to answer a question.\\n\"\n        \"Rules:\\n- Copy exact string from the document.\\n- Only return facts explicitly present.\\n\"\n        \"- Tie to the asked entity/event using anchor tokens from the question.\\n\"\n        f\"- The expected answer type is: {answer_type}.\\n\\n\"\n        f\"Question: {question}\\n\\n\"\n        \"Return JSON: {\\\"candidate\\\":\\\"\\\",\\\"evidence_quote\\\":\\\"\\\",\\\"evidence_sentence\\\":\\\"\\\",\\\"anchor_tokens_used\\\":[],\\\"answer_type_check\\\":\\\"\\\",\\\"distractors_considered\\\":[],\\\"why_this_candidate\\\":\\\"\\\",\\\"confidence\\\":\\\"\\\"}\\n\\n\"\n        f\"Document:\\n{newdoc[:8000]}\"\n    )\n    print(verify_extract)\n\n# Step 4: Verify leading candidate and SUBMIT early\nbest_candidate = (globals().get(\"best_candidate\",\"\") or \"\").strip().strip('\"').strip(\"'\")\nif best_candidate:\n    # Use candidate + anchor token(s) from the question for verification\n    anchor = Q.split()[0] if Q else \"\"\n    vhits = try_search(f\"{best_candidate} {anchor}\")\n    vdoc = get_document(vhits[0][\"docid\"]) if vhits else \"\"\n    if vdoc:\n        verdict = llm_query(\n            \"You are verifying whether a candidate directly answers the question.\\n\"\n            \"Rules: Prefer an explicit sentence that contains BOTH the candidate and an anchor token from the question.\\n\"\n            f\"Question: {question}\\n\"\n            f\"Candidate: {best_candidate}\\n\\n\"\n            \"Respond with JSON: {\\\"verdict\\\":\\\"yes|no\\\",\\\"support_quote\\\":\\\"\\\",\\\"reason\\\":\\\"\\\"}\\n\\n\"\n            f\"Document:\\n{vdoc[:8000]}\"\n        )\n        print(verdict)\n        # If verification looks good, submit immediately\n        FINAL(best_candidate)\n\n# FAILSAFE: If you reach iteration 9 without explicit verification, SUBMIT best-supported candidate\n# Ensure to pick the candidate with highest score/anchor overlap; avoid empty submission.\nif best_candidate and not globals().get(\"_submitted\", False):\n    FINAL(best_candidate)\n\nRULES:\n- NEVER repeat a search query. Each search must use different keywords (track used_searches).\n- ALWAYS read at least 2 full documents before submitting an answer.\n- Use llm_query with structured prompts to extract exact, document-anchored candidates with anchor tokens.\n- PREFER explicit statements answering the question over inferred or related facts.\n- SUBMIT via FINAL(\"answer\") as soon as a candidate is verified, or by iteration 9 at the latest.\n- A wrong answer is better than no answer.\n/no_think"}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.42)", fillcolor=lightgray, tooltip=" "];
    1 [label="1\\n(0.54)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.42)", fillcolor=lightgray, tooltip=" "];
    0 -> 1;
    1 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
