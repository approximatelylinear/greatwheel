name = "S04: Compaction preserves REPL state"
capability = "compaction"
system_prompt = "You are a helpful assistant with a Python REPL."

[[turns]]
type = "user_message"
content = "Set a to 10"
mock_response = """
```python
a = 10
```
"""

[[turns]]
type = "user_message"
content = "Set b to 20"
mock_response = """
```python
b = 20
```
"""

[[turns]]
type = "user_message"
content = "Set c to 30"
mock_response = """
```python
c = 30
```
"""

[[turns]]
type = "user_message"
content = "Define helper"
mock_response = """
```python
def helper(x):
    return x * 2
```
"""

[[turns]]
type = "user_message"
content = "Set d to 40"
mock_response = """
```python
d = 40
```
"""

[[turns]]
type = "user_message"
content = "Set e to 50"
mock_response = """
```python
e = 50
```
"""

# After 6 turns, all variables and the function should exist.
[[turns]]
type = "assert"

[[turns.checks]]
kind = "variable_equals"
name = "a"
expected = 10

[[turns.checks]]
kind = "variable_equals"
name = "b"
expected = 20

[[turns.checks]]
kind = "variable_equals"
name = "c"
expected = 30

[[turns.checks]]
kind = "variable_equals"
name = "d"
expected = 40

[[turns.checks]]
kind = "variable_equals"
name = "e"
expected = 50

[[turns.checks]]
kind = "function_defined"
name = "helper"

[[turns.checks]]
kind = "tree_size_gte"
min = 12
