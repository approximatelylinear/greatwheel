name = "S05: Branch switch and restore"
capability = "branching"
system_prompt = "You are a helpful assistant with a Python REPL."

# Turn 1: set x
[[turns]]
type = "user_message"
content = "Set x to 1"
mock_response = """
```python
x = 1
```
"""

# Turn 2: set y
[[turns]]
type = "user_message"
content = "Set y to 2"
mock_response = """
```python
y = 2
```
"""

# Turn 3: set z
[[turns]]
type = "user_message"
content = "Set z to 3"
mock_response = """
```python
z = 3
```
"""

# Verify baseline state before divergence.
[[turns]]
type = "assert"

[[turns.checks]]
kind = "variable_equals"
name = "x"
expected = 1

[[turns.checks]]
kind = "variable_equals"
name = "y"
expected = 2

[[turns.checks]]
kind = "variable_equals"
name = "z"
expected = 3

# Turn 4: diverge — overwrite x
[[turns]]
type = "user_message"
content = "Try approach A: set x to 100"
mock_response = """
```python
x = 100
```
"""

# x should now be 100
[[turns]]
type = "assert"

[[turns.checks]]
kind = "variable_equals"
name = "x"
expected = 100
