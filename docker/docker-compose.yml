services:
  greatwheel:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://gw:gw@postgres:5432/greatwheel
      RLPLAY_URL: http://rl-play:8000
      OLLAMA_URL: http://ollama:11434
      LANCE_DATA_DIR: /data/lance
    volumes:
      - lance-data:/data/lance
      - ../agents:/agents
    depends_on:
      - postgres
      - rl-play
      - ollama

  rl-play:
    build:
      context: ../../rl-play
      dockerfile: ../greatwheel/docker/Dockerfile.rl-play
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - rl-play-data:/data
    depends_on:
      - ollama

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: greatwheel
      POSTGRES_USER: gw
      POSTGRES_PASSWORD: gw
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  sglang:
    image: lmsysorg/sglang:latest
    ports:
      - "30000:30000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "sglang.launch_server"]
    command:
      - "--model-path"
      - "Qwen/Qwen3.5-9B"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "30000"
      - "--mem-fraction-static"
      - "0.80"
      - "--quantization"
      - "fp8"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/health"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 120s

volumes:
  pg-data:
  lance-data:
  ollama-models:
  rl-play-data:
  hf-cache:
